spring:
  datasource:
    url: jdbc:h2:mem:ziprun;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # create-drop: schema is generated from entities on startup and dropped on shutdown.
      ddl-auto: create-drop
    show-sql: false
    # Ensure data.sql seed (if present) runs AFTER Hibernate has created the schema.
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
